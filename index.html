<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>로그릿</title>
    <meta name="theme-color" content="#000000">
    <link rel="icon" type="image/png" href="./icon.png">
    <link rel="apple-touch-icon" href="./icon.png">
    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap');
        
        :root {
            --bg-color: #000000;
            --card-bg: #111111;
            --text-main: #cbd5e1; 
            --text-bold: #ffffff;
            --border-color: #1e1e1e;
            --brand-color: #6366f1; 
            --calendar-border: rgba(203, 213, 225, 0.1); 
            --sun-color: #ff4d4d; 
            --sat-color: #4d94ff; 
            --badge-bg: rgba(255,255,255,0.05);
        }

        body.light-mode {
            --bg-color: #ffffff;
            --card-bg: #f8fafc;
            --text-main: #1e293b; 
            --text-bold: #000000; 
            --border-color: #e2e8f0;
            --brand-color: #4f46e5;
            --calendar-border: #e2e8f0;
            --sun-color: #dc2626;
            --sat-color: #2563eb;
            --badge-bg: #f1f5f9; 
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overscroll-behavior-y: contain;
            letter-spacing: -0.05em; margin: 0; padding: 0;
            text-align: left;
            overflow-x: hidden;
        }

        .text-important { color: var(--text-bold) !important; }

        /* V173: Sticky Header & Z-index */
        .fixed-header { position: fixed; top: 0; left: 0; right: 0; height: 56px; z-index: 100; background-color: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sticky-sub { position: sticky; top: 56px; z-index: 45; background-color: var(--bg-color); width: 100%; border-bottom: 1px solid var(--calendar-border); }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); width: 100vw; margin: 0; }
        .memo-cell { min-height: 105px; background-color: var(--bg-color); display: flex; flex-direction: column; position: relative; cursor: pointer; border-right: 0.5px solid var(--calendar-border); border-bottom: 0.5px solid var(--calendar-border); overflow: hidden; }
        .memo-cell.is-selected { box-shadow: inset 0 0 0 2.5px var(--brand-color) !important; z-index: 10; }
        .memo-cell:nth-child(7n) { border-right: none; }
        
        .date-num { font-size: 14px; font-weight: 700; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; margin: 2px auto; }
        .is-today .date-num { background: var(--brand-color); color: white; border-radius: 50%; }

        .holiday-text { font-size: 9px !important; font-weight: 800; padding: 1px 4px; border-radius: 4px; text-align: center; color: var(--sun-color) !important; }
        .sun { color: var(--sun-color) !important; }
        .sat { color: var(--sat-color) !important; }

        .memo-strip { font-size: 9px; padding: 1px 4px; margin-bottom: 1px; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .expansion-panel { grid-column: 1 / span 7; background-color: var(--card-bg); border-bottom: 1px solid var(--calendar-border); padding: 16px; animation: slideDown 0.2s ease-out; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .input-field { width: 100%; background-color: rgba(255,255,255,0.05); border: 1.5px solid var(--border-color); border-radius: 12px; padding: 14px; color: var(--text-bold); outline: none; font-size: 16px; }
        .btn-primary { width: 100%; background-color: var(--brand-color); color: #ffffff; padding: 16px; border-radius: 12px; font-weight: 800; }

        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background-color: #1e293b; color: white; padding: 12px 24px; border-radius: 50px; font-size: 13px; z-index: 200; opacity: 0; visibility: hidden; transition: 0.3s; }
        #toast.visible { opacity: 1; visibility: visible; }
    </style>
</head>
<body class="pb-40 no-scrollbar">

    <!-- 상단 고정 바 -->
    <div class="fixed-header">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-indigo-600 flex items-center justify-center text-white font-black text-xl rounded-lg shadow-sm">L</div>
            <div class="flex flex-col">
                <span class="font-bold text-sm tracking-tighter text-important">로그릿</span>
                <span class="text-[7px] font-medium text-indigo-400 tracking-widest uppercase">Master V173 Stable</span>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="goToToday()" class="px-3 h-8 bg-indigo-600 text-[11px] font-bold text-white rounded-lg active:scale-95">오늘</button>
            <button onclick="openSettings()" class="w-8 h-8 flex items-center justify-center text-slate-400 active:scale-95"><i data-lucide="settings" class="w-5 h-5"></i></button>
        </div>
    </div>

    <!-- 앱 메인 뷰 -->
    <div id="app-view" class="w-full mx-auto pt-14 text-left min-h-screen text-important"></div>

    <!-- 하단 네비게이션 -->
    <nav id="bottom-nav" class="fixed bottom-6 left-4 right-4 bg-zinc-900/95 backdrop-blur-xl border border-white/10 h-16 flex justify-around items-center z-[60] rounded-2xl shadow-2xl">
        <button onclick="navTo('e_cal')" id="nav-e_cal" class="flex flex-col items-center gap-1 flex-1 text-slate-400"><i data-lucide="calendar" class="w-5 h-5"></i><span class="text-[9px] font-bold">일정</span></button>
        <button onclick="navTo('list')" id="nav-list" class="flex flex-col items-center gap-1 flex-1 text-slate-400"><i data-lucide="clipboard-list" class="w-5 h-5"></i><span class="text-[9px] font-bold">기록</span></button>
        <button onclick="navTo('s_cal')" id="nav-s_cal" class="flex flex-col items-center gap-1 flex-1 text-slate-400"><i data-lucide="trending-up" class="w-5 h-5"></i><span class="text-[9px] font-bold">매출</span></button>
        <button onclick="navTo('home')" id="nav-home" class="flex flex-col items-center gap-1 flex-1 text-slate-400"><i data-lucide="layout-grid" class="w-5 h-5"></i><span class="text-[9px] font-bold">홈</span></button>
    </nav>

    <!-- 추가 버튼 -->
    <button onclick="openEntryModal()" class="fixed right-5 bottom-24 w-14 h-14 bg-indigo-600 text-white rounded-2xl shadow-xl flex items-center justify-center z-[60] active:scale-90 transition-transform"><i data-lucide="plus" class="w-8 h-8"></i></button>

    <div id="toast">알림</div>

    <script>
        const STORAGE_KEY = 'logrit_v130_master_storage';
        let db = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        let isLightMode = JSON.parse(localStorage.getItem('theme_is_light') || 'false');
        let showAmounts = JSON.parse(localStorage.getItem('setting_show_amounts') !== null ? localStorage.getItem('setting_show_amounts') : 'true');
        
        let currentNav = 'e_cal', calContext = new Date(), selectedDate = null, searchTerm = "";
        let filterMonth = null, startX = 0, startY = 0;

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('/ROGRIT/sw.js').catch(() => {}); });
        }

        window.onload = () => { applyTheme(); render(); lucide.createIcons(); };
        function sync() { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); render(); lucide.createIcons(); }
        function formatKRW(val) { return new Intl.NumberFormat('ko-KR').format(val || 0); }
        function formatTimeDisplay(t) { return t || ''; }
        function getLocalToday() { return new Date().toISOString().split('T')[0]; }
        
        const sortItemsByTime = (items) => [...items].sort((a, b) => (parseInt((a.time||'00:00').replace(':','')) || 0) - (parseInt((b.time||'00:00').replace(':','')) || 0));
        const sortItemsByDateAsc = (items) => [...items].sort((a, b) => {
            if (a.date !== b.date) return a.date.localeCompare(b.date);
            return (parseInt((a.time||'00:00').replace(':','')) || 0) - (parseInt((b.time||'00:00').replace(':','')) || 0);
        });

        function applyTheme() { document.body.classList.toggle('light-mode', isLightMode); }
        window.showToast = (msg) => { const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('visible'); setTimeout(() => t.classList.remove('visible'), 2500); };
        window.toggleTheme = () => { isLightMode = !isLightMode; applyTheme(); render(); };
        window.navTo = (nav) => { currentNav = nav; selectedDate = null; searchTerm = ""; filterMonth = null; render(); window.scrollTo(0,0); };
        window.moveMonth = (v) => { calContext = new Date(calContext.getFullYear(), calContext.getMonth() + v, 1); selectedDate = null; render(); };
        window.goToToday = () => { const todayStr = getLocalToday(); calContext = new Date(); selectedDate = todayStr; currentNav = 'e_cal'; render(); };
        window.openSettings = () => { currentNav = 'settings'; render(); };

        // Swipe
        window.ontouchstart = (e) => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; };
        window.ontouchend = (e) => { 
            if (currentNav !== 'e_cal') return;
            const diffX = startX - e.changedTouches[0].clientX; 
            const diffY = startY - e.changedTouches[0].clientY;
            if (Math.abs(diffX) > Math.abs(diffY) * 2 && Math.abs(diffX) > 70) {
                if (diffX > 0) moveMonth(1); else moveMonth(-1);
            }
        };

        function cleanText(text, fallback = "") { if (!text) return fallback; const t = String(text).trim(); if (t === "미지정" || t === "내용없음" || t === "내용 없음") return fallback; return t; }

        function renderItemCard(item, showDate = false, forceHideAmount = false, cumulativeSum = null) {
            const hidePrice = forceHideAmount || !showAmounts;
            const note = cleanText(item.note);
            const supp = cleanText(item.supplier);
            let priceText = hidePrice ? '***' : (cumulativeSum ? formatKRW(item.amount) + ' / ' + formatKRW(cumulativeSum) : formatKRW(item.amount)) + '원';
            
            return `
                <div onclick="openEntryModal('${item.id}')" class="bg-card p-4 rounded-2xl mb-3 border border-white/5 shadow-sm text-left active:opacity-60">
                    <div class="flex justify-between items-center border-b border-white/5 pb-2 mb-2">
                        <span class="text-indigo-500 font-bold text-xs">${showDate ? item.date + ' ' : ''}${item.time || ''}</span>
                        <i data-lucide="chevron-right" class="w-4 h-4 opacity-30"></i>
                    </div>
                    <p class="font-bold text-lg text-important leading-tight mb-2">${note || '내용 없음'}</p>
                    <div class="flex justify-between items-center text-sm">
                        <span class="opacity-50">${supp || '미지정'} (인원:${item.people || 0})</span>
                        <b class="text-important">${priceText}</b>
                    </div>
                </div>`;
        }

        function render() {
            const root = document.getElementById('app-view');
            ['e_cal', 'list', 's_cal', 'home'].forEach(id => { const el = document.getElementById('nav-' + id); if(el) el.style.color = currentNav === id ? '#6366f1' : '#64748b'; });
            const mPrefix = `${calContext.getFullYear()}-${String(calContext.getMonth()+1).padStart(2,'0')}`, todayStr = getLocalToday();

            if (currentNav === 'e_cal') {
                const y = calContext.getFullYear(), m = calContext.getMonth();
                const start = new Date(y, m, 1).getDay(), last = new Date(y, m + 1, 0).getDate();
                let gridHtml = '';
                for(let i=0; i<start; i++) gridHtml += `<div class="memo-cell opacity-5"></div>`;
                for(let d=1; d<=last; d++) {
                    const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const items = sortItemsByTime(db.filter(x => x.date === dateStr));
                    const isT = dateStr === todayStr;
                    const dClass = (start+d-1)%7 === 0 ? 'sun' : ((start+d-1)%7 === 6 ? 'sat' : '');
                    gridHtml += `<div onclick="selectedDate='${dateStr}'; render();" class="memo-cell ${isT?'is-today':''} ${selectedDate===dateStr?'is-selected':''}">
                        <div class="date-num ${dClass}">${d}</div>
                        <div class="flex-1 overflow-hidden">${items.map(it => `<div class="memo-strip">${it.time||''} ${cleanText(it.supplier, it.note.substring(0,5))}</div>`).join('')}</div>
                    </div>`;
                }
                root.innerHTML = `
                    <div class="sticky-sub px-5 py-4 shadow-md">
                        <h2 class="text-3xl font-black">${m+1}월</h2>
                        <div class="grid grid-cols-7 text-center text-[10px] font-bold opacity-40 mt-4"><div>SUN</div><div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div></div>
                    </div>
                    <div class="calendar-grid">${gridHtml}</div>
                    ${selectedDate ? `<div class="expansion-panel"><h3 class="font-bold mb-4">${selectedDate} 상세</h3>${sortItemsByTime(db.filter(x=>x.date===selectedDate)).map(it=>renderItemCard(it)).join('') || '<p class="opacity-30">일정 없음</p>'}</div>` : ''}
                    <div class="flex justify-center gap-4 py-20"><button onclick="moveMonth(-1)" class="p-4 bg-zinc-900 rounded-2xl"><i data-lucide="chevron-left"></i></button><button onclick="moveMonth(1)" class="p-4 bg-zinc-900 rounded-2xl"><i data-lucide="chevron-right"></i></button></div>`;
            } else if (currentNav === 's_cal') {
                const mData = sortItemsByDateAsc(db.filter(x => x.date.startsWith(mPrefix) && Number(x.amount)>0));
                const total = mData.reduce((a,b)=>a+Number(b.amount), 0);
                let running = 0;
                root.innerHTML = `
                    <div class="sticky-sub px-5 py-6 shadow-xl">
                        <h2 class="text-2xl font-black text-indigo-500">${showAmounts?formatKRW(total)+'원':'금액 숨김'}</h2>
                        <p class="text-xs opacity-50 font-bold">${mPrefix} 통계 (${mData.length}건)</p>
                    </div>
                    <div class="px-5 py-8 space-y-4">
                        <h3 class="text-xs font-bold opacity-40 uppercase tracking-widest">Daily Records</h3>
                        ${mData.map(it => { running += Number(it.amount); return renderItemCard(it, true, false, running); }).join('') || '<p class="opacity-20 text-center py-20">내역 없음</p>'}
                    </div>`;
            } else if (currentNav === 'list') {
                const sorted = sortItemsByDateAsc(db);
                root.innerHTML = `<div class="px-5 py-6"><h2 class="text-2xl font-black mb-6">전체 기록 (과거순)</h2>${sorted.map(it => renderItemCard(it, true)).join('') || '<p class="opacity-30 text-center py-20">기록 없음</p>'}</div>`;
            } else if (currentNav === 'settings') {
                root.innerHTML = `
                    <div class="px-6 py-10 space-y-6">
                        <h2 class="text-2xl font-black mb-8">시스템 설정</h2>
                        <div class="flex justify-between items-center p-5 bg-zinc-900 rounded-2xl">
                            <span class="font-bold">금액 표시</span>
                            <button onclick="showAmounts=!showAmounts; localStorage.setItem('setting_show_amounts', showAmounts); render();" class="w-12 h-6 bg-zinc-700 rounded-full relative transition-colors"><div class="w-4 h-4 bg-white rounded-full absolute top-1 left-1" style="${showAmounts?'transform:translateX(24px)':''}"></div></button>
                        </div>
                        <button onclick="openImportModal()" class="w-full p-5 bg-indigo-600 text-white rounded-2xl font-black flex items-center justify-center gap-2"><i data-lucide="download"></i> 외부 일정 스마트 가져오기</button>
                        <div class="pt-10 border-t border-white/5 space-y-4">
                            <button onclick="location.reload(true)" class="w-full p-5 bg-zinc-800 rounded-2xl font-bold text-left">앱 강제 새로고침</button>
                            <button onclick="if(confirm('데이터를 모두 삭제할까요?')){db=[];sync();}" class="w-full p-5 text-red-500 opacity-50 font-bold text-left">전체 데이터 초기화</button>
                        </div>
                    </div>`;
            }
            lucide.createIcons();
        }

        // V173: 스마트 가져오기 모달
        window.openImportModal = () => {
            const html = `
                <div id="import-modal" class="fixed inset-0 bg-black/95 z-[200] flex items-center justify-center p-4">
                    <div class="bg-zinc-900 w-full max-w-lg rounded-3xl p-6 border border-white/10 shadow-2xl">
                        <div class="flex justify-between items-center mb-4"><h3 class="text-xl font-bold">일정 스마트 가져오기</h3><button onclick="document.getElementById('import-modal').remove()"><i data-lucide="x"></i></button></div>
                        <textarea id="import-input" class="w-full h-40 bg-black border border-white/10 rounded-xl p-4 text-sm mb-4" placeholder="내용을 붙여넣으세요... (예: 2월 17일 10시 미팅)"></textarea>
                        <button onclick="processImport()" class="btn-primary mb-4">분석하기</button>
                        <div id="import-preview" class="max-h-40 overflow-y-auto space-y-2 mb-4"></div>
                        <div id="import-btns" class="hidden"><button onclick="saveImported()" class="btn-primary bg-green-600">분석된 일정 모두 저장</button></div>
                    </div>
                </div>`;
            document.body.insertAdjacentHTML('beforeend', html); lucide.createIcons();
        };

        let tempItems = [];
        window.processImport = () => {
            const input = document.getElementById('import-input').value;
            const lines = input.split('\n').filter(l => l.trim().length > 0);
            const preview = document.getElementById('import-preview');
            tempItems = [];
            lines.forEach(line => {
                let dateMatch = line.match(/(\d{1,2})월\s*(\d{1,2})일/) || line.match(/(\d{1,2})[.\/](\d{1,2})/);
                let timeMatch = line.match(/(\d{1,2})시\s*(\d{1,2})?분?/) || line.match(/(\d{2}):(\d{2})/);
                let month = dateMatch ? dateMatch[1].padStart(2,'0') : String(new Date().getMonth()+1).padStart(2,'0');
                let day = dateMatch ? dateMatch[2].padStart(2,'0') : String(new Date().getDate()).padStart(2,'0');
                let hour = timeMatch ? timeMatch[1].padStart(2,'0') : "10";
                let min = (timeMatch && timeMatch[2]) ? timeMatch[2].padStart(2,'0') : "00";
                tempItems.push({ id: Date.now()+Math.random(), date: `${new Date().getFullYear()}-${month}-${day}`, time: `${hour}:${min}`, note: line.substring(0,30), amount: 0, supplier: "미지정", people: 1 });
            });
            preview.innerHTML = tempItems.map(it => `<div class="p-2 bg-white/5 rounded-lg text-xs"><b>${it.date} ${it.time}</b>: ${it.note}</div>`).join('');
            if(tempItems.length>0) document.getElementById('import-btns').classList.remove('hidden');
        };

        window.saveImported = () => { db = [...db, ...tempItems]; sync(); document.getElementById('import-modal').remove(); showToast(`${tempItems.length}건 저장 완료`); navTo('e_cal'); };

        window.openEntryModal = (id = null) => {
            const it = id ? db.find(x => String(x.id) === id) : null;
            const date = it ? it.date : (selectedDate || getLocalToday());
            const note = prompt("활동 내용을 입력하세요", it ? it.note : "");
            if (note !== null) {
                const amount = prompt("금액을 입력하세요 (숫자만)", it ? it.amount : "0");
                const newRecord = { id: it ? it.id : Date.now(), date, note, amount: parseInt(amount)||0, supplier: it ? it.supplier : "미지정", time: it ? it.time : "10:00", people: it ? it.people : 1 };
                if (it) db = db.map(x => x.id === it.id ? newRecord : x); else db.push(newRecord);
                sync();
            }
        };
    </script>
</body>
</html>
