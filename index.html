<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>로그릿</title>
    <meta name="theme-color" content="#000000">
    <link rel="icon" type="image/png" href="./icon.png">
    <link rel="apple-touch-icon" href="./icon.png">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- 무한루프를 일으키던 강제 새로고침 스크립트 완전 삭제 완료 -->

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap');
        :root {
            --bg-color: #000000; --card-bg: #111111; --text-main: #cbd5e1; --text-bold: #ffffff;
            --border-color: #1e1e1e; --brand-color: #6366f1; --calendar-border: rgba(255,255,255,0.08);
            --sun-color: #ff4d4d; --sat-color: #4d94ff;
        }
        body.light-mode {
            --bg-color: #ffffff; --card-bg: #f8fafc; --text-main: #1e293b; --text-bold: #000000;
            --border-color: #e2e8f0; --brand-color: #4f46e5; --calendar-border: #e2e8f0;
        }
        body { 
            font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); color: var(--text-main);
            -webkit-tap-highlight-color: transparent; user-select: none; margin: 0; padding: 0; text-align: left; overflow-x: hidden;
        }
        .text-important { color: var(--text-bold) !important; }
        .fixed-header { position: fixed; top: 0; left: 0; right: 0; height: 56px; z-index: 100; background-color: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sticky-sub { position: sticky; top: 56px; z-index: 45; background-color: var(--bg-color); width: 100%; border-bottom: 1px solid var(--calendar-border); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); width: 100vw; border-top: 1px solid var(--calendar-border); }
        .memo-cell { min-height: 115px; border-right: 0.5px solid var(--calendar-border); border-bottom: 0.5px solid var(--calendar-border); position: relative; cursor: pointer; display: flex; flex-direction: column; overflow: hidden; }
        .memo-cell.is-selected { background-color: rgba(99, 102, 241, 0.05); box-shadow: inset 0 0 0 2px var(--brand-color); z-index: 10; }
        .memo-cell:nth-child(7n) { border-right: none; }
        
        .date-num { font-size: 16px; font-weight: 800; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; margin: 2px auto 0; transition: 0.2s; }
        .is-today .date-num { background: var(--brand-color); color: white; border-radius: 50%; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4); }
        .holiday-text { font-size: 9.5px; font-weight: 800; color: var(--sun-color); text-align: center; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; padding: 0 2px; line-height: 1.1; letter-spacing: -0.05em; }
        
        .memo-strip { font-size: 11px; padding: 2px 4px; color: var(--text-main); white-space: nowrap; overflow: hidden; font-weight: 600; letter-spacing: -0.05em; }
        .sun { color: var(--sun-color) !important; } .sat { color: var(--sat-color) !important; }
        .input-field { width: 100%; background-color: rgba(255,255,255,0.05); border: 1.5px solid var(--border-color); border-radius: 14px; padding: 16px; color: var(--text-bold); outline: none; font-size: 16px; }
        .btn-primary { width: 100%; background-color: var(--brand-color); color: #ffffff; padding: 18px; border-radius: 14px; font-weight: 900; }
        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background-color: #1e293b; color: white; padding: 12px 24px; border-radius: 50px; font-size: 13px; z-index: 300; opacity: 0; visibility: hidden; transition: 0.3s; }
        #toast.visible { opacity: 1; visibility: visible; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-40 no-scrollbar">

    <div class="fixed-header">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-indigo-600 flex items-center justify-center text-white font-black text-xl rounded-lg shadow-sm">L</div>
            <div class="flex flex-col text-left">
                <span class="font-bold text-sm tracking-tighter text-important">로그릿</span>
                <span class="text-[7px] font-medium text-indigo-400 tracking-widest uppercase">Master V194 Stable</span>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="goToToday()" class="px-3 h-8 bg-indigo-600 text-[11px] font-bold text-white rounded-lg active:scale-95">오늘</button>
            <button onclick="openSettings()" class="w-8 h-8 flex items-center justify-center text-slate-400 active:scale-95"><i data-lucide="settings" class="w-5 h-5"></i></button>
        </div>
    </div>

    <div id="app-view" class="w-full mx-auto pt-14 text-left min-h-screen"></div>

    <nav id="bottom-nav" class="fixed bottom-6 left-4 right-4 bg-zinc-900/95 backdrop-blur-xl border border-white/10 h-16 flex justify-around items-center z-[60] rounded-2xl shadow-2xl">
        <button onclick="navTo('e_cal')" id="nav-e_cal" class="flex flex-col items-center gap-1 transition-all flex-1 text-slate-400"><i data-lucide="calendar" class="w-5 h-5"></i><span class="text-[9px] font-bold">일정</span></button>
        <button onclick="navTo('list')" id="nav-list" class="flex flex-col items-center gap-1 transition-all flex-1 text-slate-400"><i data-lucide="clipboard-list" class="w-5 h-5"></i><span class="text-[9px] font-bold">기록</span></button>
        <button onclick="navTo('s_cal')" id="nav-s_cal" class="flex flex-col items-center gap-1 transition-all flex-1 text-slate-400"><i data-lucide="trending-up" class="w-5 h-5"></i><span class="text-[9px] font-bold">매출</span></button>
        <button onclick="navTo('home')" id="nav-home" class="flex flex-col items-center gap-1 transition-all flex-1 text-slate-400"><i data-lucide="layout-grid" class="w-5 h-5"></i><span class="text-[9px] font-bold">홈</span></button>
    </nav>

    <button onclick="openEntryModal()" class="fixed right-5 bottom-24 w-16 h-16 bg-indigo-600 text-white rounded-3xl shadow-2xl flex items-center justify-center z-[60] active:scale-90 transition-transform"><i data-lucide="plus" class="w-8 h-8"></i></button>
    <div id="toast">알림</div>

    <script>
        // 안전한 DB 로드
        const STORAGE_KEY = 'logrit_v130_master_storage';
        let db = [];
        try { 
            db = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); 
            if (!Array.isArray(db)) db = [];
        } catch(e) { db = []; console.error('DB Load Error'); }

        let isLightMode = false;
        try { isLightMode = JSON.parse(localStorage.getItem('theme_is_light') || 'false'); } catch(e) {}

        let showAmounts = true;
        try { 
            const saved = localStorage.getItem('setting_show_amounts');
            showAmounts = saved !== null ? JSON.parse(saved) : true;
        } catch(e) {}
        
        let currentNav = 'e_cal', currentEditId = null, calContext = new Date(), selectedDate = null, searchTerm = "";
        let filterMonth = null, startX = 0, startY = 0;

        if ('serviceWorker' in navigator) { 
            window.addEventListener('load', () => { navigator.serviceWorker.register('/ROGRIT/sw.js').catch(()=>{}); }); 
        }

        window.onload = () => { applyTheme(); render(); lucide.createIcons(); };
        
        function sync() { 
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); } catch(e){ alert('용량 초과! 오래된 데이터를 지워주세요.'); }
            render(); lucide.createIcons(); 
        }
        
        function formatKRW(v) { return new Intl.NumberFormat('ko-KR').format(v || 0); }
        function getLocalToday() { const n = new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`; }
        function applyTheme() { document.body.classList.toggle('light-mode', isLightMode); }
        window.showToast = (msg) => { const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('visible'); setTimeout(() => t.classList.remove('visible'), 2500); };
        window.toggleTheme = () => { isLightMode = !isLightMode; applyTheme(); render(); localStorage.setItem('theme_is_light', isLightMode); };
        
        window.navTo = (nav) => { 
            currentNav = nav; selectedDate = null; searchTerm = ""; filterMonth = null; 
            render(); window.scrollTo(0,0); 
        };
        
        window.moveMonth = (v) => { calContext = new Date(calContext.getFullYear(), calContext.getMonth() + v, 1); selectedDate = null; render(); };
        window.goToToday = () => { const today = getLocalToday(); calContext = new Date(); selectedDate = today; currentNav = 'e_cal'; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); openDailyModal(today); };
        window.openSettings = () => { currentNav = 'settings'; render(); };
        
        window.handleDateTouch = (dateStr) => { selectedDate = dateStr; render(); openDailyModal(dateStr); };

        window.ontouchstart = (e) => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; };
        window.ontouchend = (e) => { 
            if (currentNav !== 'e_cal') return;
            const diffX = startX - e.changedTouches[0].clientX; 
            const diffY = startY - e.changedTouches[0].clientY;
            if (Math.abs(diffX) > Math.abs(diffY) * 2.5 && Math.abs(diffX) > 80) {
                if (diffX > 0) moveMonth(1); else moveMonth(-1);
            }
        };

        function cleanText(t, fb="") { if(!t) return fb; const v = String(t).trim(); return (v==="" || v==="미지정" || v==="내용없음" || v==="내용 없음") ? fb : v; }
        function smartTimeFormat(t) { if(!t) return ''; const p = t.split(':'); if(p.length === 2) { const h = parseInt(p[0], 10); if(p[1] === '00' || p[1] === '0') return `${h}시`; return `${h}:${p[1]}`; } return t; }

        const sortMaster = (arr) => [...arr].sort((a,b) => {
            if (a.date !== b.date) return a.date.localeCompare(b.date);
            const tA = parseInt((a.time||'00:00').replace(':','')) || 0;
            const tB = parseInt((b.time||'00:00').replace(':','')) || 0;
            return tA - tB;
        });

        // 공휴일 & 기독교 절기
        const lunarHolidays = {
            '2024-02-09':'설날연휴', '2024-02-10':'설날', '2024-02-11':'설날연휴', '2024-02-12':'대체공휴일', '2024-05-15':'부처님오신날', '2024-09-16':'추석연휴', '2024-09-17':'추석', '2024-09-18':'추석연휴',
            '2025-01-28':'설날연휴', '2025-01-29':'설날', '2025-01-30':'설날연휴', '2025-05-05':'부처님오신날', '2025-05-06':'대체공휴일', '2025-10-05':'추석연휴', '2025-10-06':'추석', '2025-10-07':'추석연휴', '2025-10-08':'대체공휴일', '2025-10-09':'한글날(대체)',
            '2026-02-16':'설날연휴', '2026-02-17':'설날', '2026-02-18':'설날연휴', '2026-05-24':'부처님오신날', '2026-05-25':'대체공휴일', '2026-09-24':'추석연휴', '2026-09-25':'추석', '2026-09-26':'추석연휴',
            '2027-02-06':'설날연휴', '2027-02-07':'설날', '2027-02-08':'설날연휴', '2027-02-09':'대체공휴일', '2027-05-13':'부처님오신날', '2027-09-14':'추석연휴', '2027-09-15':'추석', '2027-09-16':'추석연휴'
        };

        function getHoliday(y, m, d) {
            const mm = String(m).padStart(2, '0');
            const dd = String(d).padStart(2, '0');
            const dStr = `${y}-${mm}-${dd}`;
            
            if (mm === '01' && dd === '01') return '신정';
            if (mm === '03' && dd === '01') return '삼일절';
            if (mm === '05' && dd === '05') return '어린이날';
            if (mm === '06' && dd === '06') return '현충일';
            if (mm === '08' && dd === '15') return '광복절';
            if (mm === '10' && dd === '03') return '개천절';
            if (mm === '10' && dd === '09') return '한글날';
            if (mm === '12' && dd === '25') return '성탄절';

            const f = Math.floor, G = y % 19, C = f(y / 100);
            const H = (C - f(C / 4) - f((8 * C + 13) / 25) + 19 * G + 15) % 30;
            const I = H - f(H / 28) * (1 - f(29 / (H + 1)) * f((21 - G) / 11));
            const J = (y + f(y / 4) + I + 2 - C + f(C / 4)) % 7;
            const L = I - J, eMonth = 3 + f((L + 40) / 44), eDay = L + 28 - 31 * f(eMonth / 4);
            if (m === eMonth && d === eDay) return '부활절';

            let nov1 = new Date(y, 10, 1);
            let offset = nov1.getDay() === 0 ? 0 : 7 - nov1.getDay();
            let thanksDay = 1 + offset + 14;
            if (m === 11 && d === thanksDay) return '추수감사';

            if (lunarHolidays[dStr]) return lunarHolidays[dStr];
            return null;
        }

        function renderItemCard(item, showDate = false, cumulativeSum = null, forceAlwaysShow = false) {
            const note = cleanText(item.note); const supp = cleanText(item.supplier); const dept = cleanText(item.departure); const arrv = cleanText(item.arrival);
            const shouldHide = !forceAlwaysShow && !showAmounts;
            let priceDisplay = "";
            if (item.amount > 0) {
                if (!shouldHide) priceDisplay = cumulativeSum ? `💰 ${formatKRW(item.amount)} / ${formatKRW(cumulativeSum)}원` : `💰 ${formatKRW(item.amount)}원`;
            }
            return `
                <div onclick="openEntryModal('${item.id}')" class="bg-card p-5 rounded-2xl mb-3 border border-white/5 shadow-lg text-left active:opacity-60 transition-all">
                    <div class="flex justify-between items-center border-b border-white/5 pb-2 mb-3">
                        <span class="text-indigo-500 font-bold text-[14px] uppercase">${showDate ? item.date+' ' : ''}${smartTimeFormat(item.time)}</span>
                        <i data-lucide="chevron-right" class="w-4 h-4 opacity-40"></i>
                    </div>
                    <p class="font-bold text-lg text-important leading-tight mb-2">${note || '일정 기록'}</p>
                    ${(dept || arrv) ? `<div class="bg-white/5 p-3 rounded-xl mb-3 text-sm font-bold flex items-center gap-2 text-important border border-white/5"><span>${dept || '..'}</span> <i data-lucide="arrow-right" class="w-3 h-3 opacity-50"></i> <span>${arrv || '..'}</span></div>` : ''}
                    <div class="flex justify-between items-end text-sm">
                        <span class="opacity-50 font-medium">${supp || ''} ${item.people > 1 ? '(인원:'+item.people+')' : ''}</span>
                        <b class="text-important text-lg font-black tracking-tighter">${priceDisplay}</b>
                    </div>
                </div>`;
        }

        window.viewSupplierMonthly = (supplier) => {
            filterMonth = `${calContext.getFullYear()}-${String(calContext.getMonth()+1).padStart(2,'0')}`;
            searchTerm = supplier.toLowerCase(); 
            currentNav = 'list'; 
            render();
            window.scrollTo(0,0);
        };

        window.renderListContent = () => {
            const listContainer = document.getElementById('record-list-content');
            if (listContainer) {
                let filtered = filterMonth ? db.filter(x => x.date.startsWith(filterMonth)) : db;
                filtered = filtered.filter(it => (it.note||'').toLowerCase().includes(searchTerm) || (it.supplier||'').toLowerCase().includes(searchTerm));
                filtered = sortMaster(filtered);
                
                let runningTotal = 0;
                listContainer.innerHTML = filtered.map(x => {
                    runningTotal += Number(x.amount || 0);
                    return renderItemCard(x, true, runningTotal, true);
                }).join('') || `<p class="text-center py-24 opacity-30 italic text-important">기록이 없습니다.</p>`;
                lucide.createIcons();
            }
        };

        function render() {
            const root = document.getElementById('app-view');
            ['e_cal', 'list', 's_cal', 'home'].forEach(id => { const btn = document.getElementById('nav-' + id); if(btn) btn.style.color = currentNav === id ? '#6366f1' : '#64748b'; });
            const mPrefix = `${calContext.getFullYear()}-${String(calContext.getMonth()+1).padStart(2,'0')}`, todayStr = getLocalToday();

            if (currentNav === 'e_cal') {
                const y = calContext.getFullYear(), m = calContext.getMonth();
                const start = new Date(y, m, 1).getDay(), last = new Date(y, m + 1, 0).getDate();
                let gridHtml = '';
                for(let i=0; i<start; i++) gridHtml += `<div class="memo-cell opacity-5"></div>`;
                for(let d=1; d<=last; d++) {
                    const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const items = sortMaster(db.filter(x => x.date === dStr));
                    const isT = dStr === todayStr;
                    let dCls = (start+d-1)%7 === 0 ? 'sun' : ((start+d-1)%7 === 6 ? 'sat' : '');
                    
                    const holName = getHoliday(y, m+1, d);
                    if (holName) dCls = 'sun'; 
                    const holHtml = holName ? `<div class="holiday-text">${holName}</div>` : '';

                    gridHtml += `<div onclick="handleDateTouch('${dStr}');" class="memo-cell ${isT?'is-today':''} ${selectedDate===dStr?'is-selected':''}">
                        <div class="flex flex-col items-center justify-start shrink-0 w-full min-h-[36px]">
                            <div class="date-num ${dCls}">${d}</div>
                            ${holHtml}
                        </div>
                        <div class="flex-1 overflow-hidden px-0.5 mt-0.5">${items.map(it => `<div class="memo-strip">${smartTimeFormat(it.time)} ${cleanText(it.supplier, it.note.substring(0,5))}</div>`).join('')}</div>
                    </div>`;
                }
                root.innerHTML = `
                    <div class="animate-in fade-in">
                        <div class="sticky-sub px-5 py-5 shadow-lg">
                            <h2 class="text-3xl font-black text-important">${m+1}월</h2>
                            <div class="grid grid-cols-7 text-center text-[11px] font-extrabold opacity-40 mt-5"><div>SUN</div><div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div></div>
                        </div>
                        <div class="calendar-grid">${gridHtml}</div>
                        <div class="flex justify-center mt-20 mb-32"><div class="flex gap-1 bg-white/5 p-1 rounded-xl border border-white/10"><button onclick="moveMonth(-1)" class="p-4 active:scale-90"><i data-lucide="chevron-left" class="text-important"></i></button><button onclick="moveMonth(1)" class="p-4 active:scale-90"><i data-lucide="chevron-right" class="text-important"></i></button></div></div>
                    </div>`;
            } else if (currentNav === 'list') {
                const monthInfo = filterMonth ? `
                    <div class="mt-3 px-1 text-indigo-500 font-bold text-xs uppercase flex justify-between items-center">
                        <span>현재 ${parseInt(filterMonth.split('-')[1])}월 내역만 보는 중</span>
                        <button onclick="navTo('list')" class="underline underline-offset-2 active:opacity-50">전체 보기</button>
                    </div>` : "";
                root.innerHTML = `
                    <div class="px-5 py-6 text-important animate-in fade-in">
                        <div class="py-4 sticky-sub top-[56px] bg-black/90 backdrop-blur">
                            <input type="text" placeholder="검색..." class="input-field" value="${searchTerm}" oninput="searchTerm=this.value.toLowerCase(); window.renderListContent();">
                            ${monthInfo}
                        </div>
                        <h2 class="text-2xl font-black mb-6 mt-4">기록 리스트 (과거순)</h2>
                        <div id="record-list-content"></div>
                    </div>`;
                window.renderListContent();
            } else if (currentNav === 's_cal') {
                const mData = sortMaster(db.filter(x => x.date.startsWith(mPrefix) && Number(x.amount)>0));
                const total = mData.reduce((a,b)=>a+Number(b.amount), 0);
                const bySupp = mData.reduce((acc, c) => { const n = cleanText(c.supplier, '기타'); if(!acc[n]) acc[n] = { amount: 0, count: 0 }; acc[n].amount += Number(c.amount); acc[n].count += 1; return acc; }, {});
                let running = 0;
                root.innerHTML = `
                    <div class="animate-in fade-in text-left text-important">
                        <div class="sticky-sub px-5 py-5 border-b border-white/5 shadow-xl">
                            <h2 class="text-2xl font-black text-indigo-500">${formatKRW(total)}원</h2>
                            <p class="text-[11px] opacity-40 font-bold uppercase tracking-widest mt-1">${mPrefix} 통계 / ${mData.length}건의 기록</p>
                        </div>
                        <div class="px-5 pt-8">
                            <h3 class="text-[11px] opacity-40 uppercase font-bold mb-4 px-1 tracking-widest">거래처별 합계 (터치 시 해당 월 기록)</h3>
                            <div class="bg-zinc-950 light-mode:bg-white border border-white/5 overflow-hidden rounded-3xl mb-10">
                                ${Object.entries(bySupp).sort((a,b)=>b[1].amount - a[1].amount).map(([n, d]) => `<div onclick="viewSupplierMonthly('${n}')" class="flex justify-between items-center p-5 border-b border-white/5 active:bg-indigo-500/10 cursor-pointer"><div class="flex flex-col gap-0.5"><span class="font-bold text-[14px]">${n}</span><span class="text-[10px] text-indigo-500 font-bold uppercase tracking-widest">${d.count}건</span></div><span class="font-black text-indigo-400 text-[16px]">${formatKRW(d.amount)}원</span></div>`).join('') || '<p class="p-16 text-center opacity-30 text-sm">내역 없음</p>'}
                            </div>
                            <h3 class="text-[11px] opacity-40 uppercase font-bold mb-4 px-1 tracking-widest">일별 매출 기록 (매출 / 일합계)</h3>
                            <div class="bg-zinc-900/30 light-mode:bg-slate-50 border border-white/5 rounded-3xl px-5 py-3 mb-20">
                                ${mData.map(it => { running += Number(it.amount); return `<div class="flex flex-col py-4 border-b border-white/5 last:border-0"><div class="flex justify-between items-end"><span class="text-xl font-black text-important">${it.date.split('-')[1]}월 ${it.date.split('-')[2]}일</span><span class="text-[11px] font-bold text-indigo-400 uppercase">${cleanText(it.supplier, '기타')}</span></div><div class="flex justify-between mt-1 text-sm"><span class="opacity-50 font-medium">${cleanText(it.note).substring(0,18)}</span><b class="text-important font-mono">${formatKRW(it.amount)} / ${formatKRW(running)}</b></div></div>`; }).join('') || '<p class="p-10 text-center opacity-30 text-sm">내역 없음</p>'}
                            </div>
                        </div>
                    </div>`;
            } else if (currentNav === 'home') {
                const todayItems = sortMaster(db.filter(x => x.date === todayStr)), monthTotal = db.filter(x => x.date.startsWith(mPrefix)).reduce((acc, cur) => acc + (Number(cur.amount) || 0), 0);
                root.innerHTML = `<div class="animate-in fade-in px-5 pt-4 text-important text-left"><div class="bg-gradient-to-br from-indigo-950/20 to-zinc-900/50 light-mode:from-indigo-50 light-mode:to-white p-8 mb-8 border border-indigo-500/10 light-mode:border-indigo-200 shadow-2xl rounded-[2rem] text-left"><p class="opacity-50 text-[11px] uppercase tracking-[0.2em] mb-1">Monthly Total Rev</p><h2 class="text-5xl font-black tracking-tighter text-important">${formatKRW(monthTotal)}<span class="text-xl ml-1 opacity-40 font-light">원</span></h2><div class="mt-8 flex flex-col text-left"><span class="text-[11px] opacity-40 uppercase tracking-widest">오늘 일정</span><span class="text-3xl font-black text-indigo-500">${todayItems.length}건</span></div></div><h3 class="opacity-40 text-[11px] uppercase px-1 mb-4 tracking-[0.3em]">Today's Activity</h3>${todayItems.map(it => renderItemCard(it, false, null, true)).join('') || '<p class="text-center py-20 opacity-30 text-sm italic">기록 없음</p>'}</div>`;
            } else if (currentNav === 'settings') {
                root.innerHTML = `
                    <div class="px-6 py-10 space-y-6 text-important animate-in fade-in">
                        <h2 class="text-3xl font-black mb-10">시스템 설정</h2>
                        <div class="flex justify-between items-center p-6 bg-zinc-900 rounded-2xl border border-white/5">
                            <span class="font-bold">화이트 모드</span>
                            <button onclick="toggleTheme()" class="w-12 h-6 bg-zinc-700 rounded-full relative"><div class="w-4 h-4 bg-white rounded-full absolute top-1 left-1 transition-transform" style="${isLightMode?'transform:translateX(24px)':''}"></div></button>
                        </div>
                        <div class="flex justify-between items-center p-6 bg-zinc-900 rounded-2xl border border-white/5">
                            <div class="flex flex-col"><span class="font-bold">달력 상세 금액 표시</span><span class="text-[10px] opacity-40 uppercase tracking-widest mt-1">기록/매출 탭은 항상 표시됨</span></div>
                            <button onclick="showAmounts=!showAmounts; localStorage.setItem('setting_show_amounts', showAmounts); render();" class="w-12 h-6 bg-zinc-700 rounded-full relative"><div class="w-4 h-4 bg-white rounded-full absolute top-1 left-1 transition-transform" style="${showAmounts?'transform:translateX(24px)':''}"></div></button>
                        </div>
                        <button onclick="openImportModal()" class="w-full p-5 bg-indigo-600 text-white rounded-2xl font-black flex items-center justify-center gap-3 shadow-xl"><i data-lucide="download-cloud"></i> 외부 일정 스마트 가져오기</button>
                        <div class="pt-10 border-t border-white/5 space-y-4">
                            <button onclick="window.location.reload(true)" class="w-full p-5 bg-zinc-800 rounded-2xl font-bold text-left opacity-70">캐시 강제 지우기 (화면 오류 시)</button>
                            <button onclick="if(confirm('모든 데이터를 삭제할까요?')){db=[];sync();}" class="w-full p-5 text-red-500 font-bold text-left opacity-40">전체 데이터 초기화</button>
                        </div>
                    </div>`;
            }
            lucide.createIcons();
        }

        window.openDailyModal = (dateStr) => {
            const p = dateStr.split('-');
            const dailyItems = sortMaster(db.filter(x => x.date === dateStr));
            let itemsHtml = dailyItems.map(it => renderItemCard(it, false, null, false)).join('');
            if (!itemsHtml) itemsHtml = '<p class="opacity-30 py-12 text-center text-sm font-bold">등록된 일정이 없습니다.</p>';

            const html = `
                <div id="daily-modal-container" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[150] flex items-center justify-center p-5 opacity-0 transition-opacity duration-200">
                    <div class="bg-zinc-900 light-mode:bg-white w-full max-w-sm rounded-[2rem] p-6 border border-white/10 shadow-2xl transform scale-95 transition-transform duration-200 flex flex-col max-h-[85vh]">
                        <div class="flex justify-between items-center mb-5 border-b border-white/10 pb-4 shrink-0 text-important">
                            <h3 class="font-black text-2xl">${parseInt(p[1])}월 ${parseInt(p[2])}일</h3>
                            <button onclick="closeDailyModal()" class="p-2 bg-zinc-800 light-mode:bg-slate-100 rounded-full active:scale-95"><i data-lucide="x" class="w-5 h-5"></i></button>
                        </div>
                        <div class="overflow-y-auto space-y-1 no-scrollbar flex-1 mb-4 text-important">
                            ${itemsHtml}
                        </div>
                        <button onclick="openEntryModal(null, '${dateStr}')" class="w-full py-4 bg-indigo-500/10 text-indigo-400 light-mode:bg-indigo-50 light-mode:text-indigo-600 font-black rounded-xl active:scale-95 transition-transform shrink-0 border border-indigo-500/20">
                            + 이 날짜에 일정 추가
                        </button>
                    </div>
                </div>`;
            document.body.insertAdjacentHTML('beforeend', html);
            lucide.createIcons();
            setTimeout(() => {
                const c = document.getElementById('daily-modal-container');
                if(c) { c.classList.remove('opacity-0'); c.children[0].classList.remove('scale-95'); }
            }, 10);
        };

        window.closeDailyModal = () => {
            const c = document.getElementById('daily-modal-container');
            if(c) {
                c.classList.add('opacity-0'); c.children[0].classList.add('scale-95');
                setTimeout(() => { c.remove(); }, 200);
            }
        };

        window.openImportModal = () => {
            const html = `
            <div id="import-modal" class="fixed inset-0 bg-black/95 z-[200] flex items-center justify-center p-5 text-important">
                <div class="bg-zinc-900 w-full max-w-lg rounded-3xl p-6 border border-white/10 shadow-2xl text-left">
                    <div class="flex justify-between items-center mb-5">
                        <h3 class="text-xl font-bold">일정 스마트 가져오기</h3>
                        <button onclick="document.getElementById('import-modal').remove()"><i data-lucide="x"></i></button>
                    </div>
                    <div class="flex gap-2 mb-4">
                        <button onclick="document.getElementById('backup-file-input').click()" class="btn-primary flex-1 bg-zinc-800 text-white flex items-center justify-center gap-2 border border-white/5 text-sm">
                            <i data-lucide="file-text" class="w-4 h-4"></i> 백업파일(.srt) 열기
                        </button>
                        <button onclick="processImport()" class="btn-primary flex-1 text-sm bg-indigo-600">직접 텍스트 분석</button>
                    </div>
                    <input type="file" id="backup-file-input" accept=".srt,.txt" class="hidden" onchange="handleFileUpload(event)">
                    <textarea id="import-input" class="w-full h-32 bg-black border border-white/10 rounded-xl p-4 text-sm mb-5 text-white" placeholder="여기에 내용을 붙여넣거나 위에 있는 [파일 열기]를 누르세요."></textarea>
                    
                    <div id="import-preview" class="max-h-40 overflow-y-auto space-y-2 mb-5 text-important"></div>
                    <div id="import-btns" class="hidden">
                        <button onclick="saveImported()" class="btn-primary bg-green-600 shadow-[0_0_15px_rgba(22,163,74,0.5)] border border-green-400">✅ 분석된 일정 모두 저장</button>
                    </div>
                </div>
            </div>`;
            document.body.insertAdjacentHTML('beforeend', html); lucide.createIcons();
        };

        window.handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            showToast("파일을 가져오는 중입니다...");
            const reader = new FileReader();
            reader.onload = (evt) => {
                document.getElementById('import-input').value = evt.target.result;
                window.processImport(); 
            };
            reader.readAsText(file, "UTF-8");
        };

        let tempItems = [];
        window.processImport = () => {
            const input = document.getElementById('import-input').value;
            const previewDiv = document.getElementById('import-preview');
            const btnsDiv = document.getElementById('import-btns');
            
            if(!input.trim()) {
                previewDiv.innerHTML = '<p class="text-red-400 p-2 text-center text-sm font-bold">내용이 비어있습니다.</p>';
                btnsDiv.classList.add('hidden');
                return;
            }
            
            const lines = input.split('\n').map(l => l.trim());
            tempItems = [];
            let currentItem = null;
            const currentYear = new Date().getFullYear();
            
            const srtTimeRegex = /^\d{2}:\d{2}:\d{2},\d{3}\s*-->\s*\d{2}:\d{2}:\d{2},\d{3}$/;
            const srtIndexRegex = /^\d+$/;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                if (!line) continue;
                if (srtTimeRegex.test(line)) continue;
                if (srtIndexRegex.test(line) && i + 1 < lines.length && srtTimeRegex.test(lines[i+1])) continue;

                let dMatchFull = line.match(/(20\d{2}|\d{2})\s*[-./년]\s*(\d{1,2})\s*[-./월]\s*(\d{1,2})/);
                let dMatchShort = line.match(/(?:^|\[|\s)(\d{1,2})\s*[-./월]\s*(\d{1,2})[일\]\s]*/);
                let dMatchFlat = line.match(/^(20\d{2})(\d{2})(\d{2})$/);
                
                let tMatch = line.match(/(\d{1,2})시\s*(\d{1,2})?분?/) || line.match(/(\d{2}):(\d{2})/);
                let amtMatch = line.match(/(\d{1,3}(,\d{3})+|\d{4,9})원/);

                let dateFound = null;
                if (dMatchFull) {
                    let y = dMatchFull[1].length === 2 ? '20' + dMatchFull[1] : dMatchFull[1];
                    dateFound = `${y}-${String(dMatchFull[2]).padStart(2,'0')}-${String(dMatchFull[3]).padStart(2,'0')}`;
                }
                else if (dMatchFlat) dateFound = `${dMatchFlat[1]}-${dMatchFlat[2]}-${dMatchFlat[3]}`;
                else if (dMatchShort) dateFound = `${currentYear}-${String(dMatchShort[1]).padStart(2,'0')}-${String(dMatchShort[2]).padStart(2,'0')}`;

                if (dateFound) {
                    let hour = tMatch ? tMatch[1].padStart(2,'0') : "10";
                    let min = (tMatch && tMatch[2]) ? tMatch[2].padStart(2,'0') : "00";
                    let amt = amtMatch ? parseInt(amtMatch[1].replace(/,/g,'')) : 0;
                    
                    let cleanNote = line.replace(dMatchFull ? dMatchFull[0] : (dMatchShort ? dMatchShort[0] : (dMatchFlat ? dMatchFlat[0] : '')), '')
                                        .replace(tMatch ? tMatch[0] : '', '').replace(amtMatch ? amtMatch[0] : '', '').replace(/^[-\s[\]]+/, '').trim();

                    if (currentItem) tempItems.push(currentItem);
                    currentItem = { id: Date.now() + '-' + i, date: dateFound, time: `${hour}:${min}`, note: cleanNote, amount: amt, supplier: "미지정", people: 1 };
                } else {
                    if (currentItem) currentItem.note += (currentItem.note ? '\n' : '') + line;
                }
            }
            if (currentItem) tempItems.push(currentItem);

            if (tempItems.length > 0) {
                previewDiv.innerHTML = tempItems.map(it => `
                    <div class="p-3 bg-white/5 rounded-xl text-xs flex flex-col mb-2 border border-white/10">
                        <div class="flex justify-between items-center mb-1 font-bold">
                            <span class="text-indigo-400">${it.date} ${smartTimeFormat(it.time)}</span>
                            ${it.amount > 0 ? `<span class="text-yellow-400">${formatKRW(it.amount)}원</span>` : ''}
                        </div>
                        <div class="opacity-80 whitespace-pre-wrap">${it.note || '내용 없음'}</div>
                    </div>
                `).join('');
                
                btnsDiv.classList.remove('hidden');
                showToast(`${tempItems.length}개의 일정을 찾았습니다.`);
            } else {
                previewDiv.innerHTML = `<p class="text-red-400 p-4 text-center font-bold text-sm bg-red-900/20 rounded-xl">❌ 파일에서 올바른 날짜 형식을 찾지 못했습니다.</p>`;
                btnsDiv.classList.add('hidden');
            }
        };

        window.saveImported = () => { 
            db = [...db, ...tempItems]; 
            sync(); 
            document.getElementById('import-modal').remove(); 
            showToast(`✅ ${tempItems.length}건 저장 완료! 전체 기록으로 이동합니다.`); 
            navTo('list'); 
        };

        window.openEntryModal = (id = null, presetDate = null) => {
            closeDailyModal(); 
            currentEditId = id ? String(id) : null;
            const it = id ? db.find(x => String(x.id) === id) : null;
            const defaultDate = it ? it.date : (presetDate || selectedDate || getLocalToday());
            
            let html = `<div id="modal-container" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-[200] flex items-end text-left"><div class="bg-zinc-900 w-full max-w-md mx-auto rounded-t-3xl p-6 pb-12 overflow-y-auto max-h-[95vh] light-mode:bg-white text-important text-left">
                <div class="flex justify-between items-center mb-6 text-important"><h3 class="text-xl font-bold">활동 상세 기록</h3><button onclick="document.getElementById('modal-container').remove()" class="p-2 bg-zinc-800 rounded-full text-slate-400 active:scale-95"><i data-lucide="x" class="w-5 h-5"></i></button></div>
                <form id="record-form" onsubmit="window.saveRecord(event)" class="space-y-4">
                    <input type="date" id="f-date" class="input-field" required value="${defaultDate}">
                    <div class="grid grid-cols-2 gap-3"><input type="text" id="f-departure" placeholder="출발지" class="input-field font-bold"> <input type="text" id="f-arrival" placeholder="도착지" class="input-field font-bold"></div>
                    <div class="grid grid-cols-2 gap-3"><input type="text" id="f-time" placeholder="예: 710, 1430" maxlength="5" inputmode="numeric" oninput="window.autoFormatTime(this)" onblur="window.formatTimeOnBlur(this)" class="input-field font-mono"> <input type="number" id="f-people" placeholder="인원" class="input-field font-bold"></div>
                    <input type="text" id="f-supplier" placeholder="거래처명" class="input-field font-bold">
                    <div class="relative w-full text-important"><input type="text" id="f-amount-display" placeholder="매출 금액" inputmode="numeric" oninput="window.handleAmountInput(this)" class="input-field font-bold text-xl pr-10 text-important"><span class="absolute right-4 top-1/2 -translate-y-1/2 opacity-60 font-bold text-white">원</span></div>
                    <textarea id="f-note" placeholder="상세 메모" class="input-field h-32 p-4 leading-relaxed"></textarea>
                    <div id="form-actions" class="flex gap-3 mt-6">
                        ${id ? `<button type="button" onclick="window.deleteItemDirect('${id}')" id="delete-btn" class="flex-1 bg-red-950/20 text-red-500 py-4 border border-red-900/20 rounded-xl font-bold text-center">삭제</button>` : ''}
                        ${id ? `<button type="button" onclick="window.startCopy()" class="flex-1 bg-zinc-800 text-important py-4 border border-white/5 rounded-xl font-bold text-center">복사</button>` : ''}
                        <button type="submit" class="flex-[2] btn-primary">저장하기</button>
                    </div>
                </form>
            </div></div>`;
            document.body.insertAdjacentHTML('beforeend', html); lucide.createIcons();
            if(id && it) { 
                document.getElementById('f-date').value = it.date; 
                document.getElementById('f-supplier').value = it.supplier === "미지정" ? "" : it.supplier; 
                document.getElementById('f-amount-display').value = it.amount ? Number(it.amount).toLocaleString() : ''; 
                document.getElementById('f-note').value = (it.note === "내용없음" || it.note === "내용 없음") ? "" : it.note; 
                document.getElementById('f-time').value = it.time || ''; 
                document.getElementById('f-departure').value = it.departure || ''; 
                document.getElementById('f-arrival').value = it.arrival || ''; 
                document.getElementById('f-people').value = it.people || ''; 
            }
        };

        window.startCopy = () => { currentEditId = null; document.getElementById('delete-btn')?.remove(); event.currentTarget.remove(); showToast("내용 복사 완료! 날짜를 선택해 주세요."); };
        window.saveRecord = (e) => { e.preventDefault(); const raw = document.getElementById('f-amount-display').value.replace(/[^0-9]/g, ''); const record = { id: currentEditId || String(Date.now()), date: document.getElementById('f-date').value, amount: parseInt(raw || 0), supplier: document.getElementById('f-supplier').value.trim() || "미지정", note: document.getElementById('f-note').value.trim() || "내용없음", time: document.getElementById('f-time').value, departure: document.getElementById('f-departure').value, arrival: document.getElementById('f-arrival').value, people: parseInt(document.getElementById('f-people').value || 0), updatedAt: Date.now() }; if(currentEditId) db = db.map(x => String(x.id) === currentEditId ? record : x); else db.push(record); document.getElementById('modal-container').remove(); sync(); };
        window.deleteItemDirect = (id) => { if(confirm('삭제하시겠습니까?')) { db = db.filter(x => String(x.id) !== id); document.getElementById('modal-container').remove(); sync(); } };
        window.autoResize = (el) => { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; };
        window.autoFormatTime = (el) => { el.value = el.value.replace(/[^0-9:]/g, ''); };
        window.formatTimeOnBlur = (el) => { 
            let v = el.value.replace(/[^0-9]/g, ''); 
            if(!v) return; 
            if(v.length<=2) el.value = v.padStart(2,'0')+':00'; 
            else if(v.length===3) el.value = '0'+v[0]+':'+v.slice(1,3); 
            else el.value = v.slice(0,2)+':'+v.slice(2,4); 
        };
        window.handleAmountInput = (el) => { let v = el.value.replace(/[^0-9]/g, ''); el.value = v ? Number(v).toLocaleString() : ''; };
    </script>
</body>
</html>
